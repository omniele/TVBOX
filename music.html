                '<img src="' + p.cover + '" class="w-full h-full object-cover" alt="' + p.name + '" loading="lazy">' +
                '<div class="absolute bottom-2 left-2 z-10">' +
                '<p class="text-sm font-bold">' + p.name + '</p>' +
                '<p class="text-xs text-gray-300">' + p.desc + '</p>' +
                '</div></div></div>';
        }).join('');
    }

    function renderRankList() {
        var list = document.getElementById('rankList');
        if (!list) return;
        list.innerHTML = rankSongs.map(function(s, i) {
            return '<div class="glass-card p-3 flex items-center gap-3 mb-2 song-item" style="animation-delay:' + (i*0.05) + 's" onclick="playRankSong(' + i + ')">' +
                '<span class="text-lg font-bold w-6 text-center ' + (i<3 ? 'text-yellow-400' : 'text-gray-500') + '">' + (i+1) + '</span>' +
                '<div class="flex-1 min-w-0">' +
                '<p class="text-sm font-bold truncate">' + s.title + '</p>' +
                '<p class="text-xs text-gray-400">' + s.artist + '</p>' +
                '</div>' +
                '<button class="text-purple-400 px-2"><i class="fas fa-play-circle text-xl"></i></button></div>';
        }).join('');
    }

    // ========== 搜索功能 ==========
    function doSearch() {
        var q = document.getElementById('searchInput').value.trim();
        if (!q) { showToast('请输入搜索关键词'); return; }

        showLoading();
        var apiUrl = 'https://api.aa1.cn/api/music/?word=' + encodeURIComponent(q);

        fetch(apiUrl)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                hideLoading();
                if (data.code === 200 && data.data && Array.isArray(data.data) && data.data.length > 0) {
                    currentSongs = data.data.map(function(item) {
                        return {
                            title: item.title || '未知歌曲',
                            artist: item.author || '未知歌手',
                            url: item.url || '',
                            cover: item.pic || '',
                            platform: item.type || 'netease',
                            songid: item.songid || '',
                            link: item.link || ''
                        };
                    }).filter(function(s) { return s.url; });

                    if (currentSongs.length === 0) {
                        showToast('未找到可播放的歌曲');
                        return;
                    }

                    renderSongs(currentSongs);
                    document.getElementById('searchResultSection').style.display = 'block';
                    document.getElementById('emptyState').style.display = 'none';
                    document.getElementById('resultCount').textContent = '共 ' + currentSongs.length + ' 首';
                } else {
                    showToast('未找到相关歌曲');
                }
            })
            .catch(function(err) {
                hideLoading();
                showToast('搜索失败: ' + err.message);
            });
    }

    function quickSearch(q) {
        document.getElementById('searchInput').value = q;
        doSearch();
    }

    function renderSongs(songs) {
        var list = document.getElementById('songList');
        if (!list) return;
        list.innerHTML = songs.map(function(s, i) {
            var platformClass = s.platform === 'netease' ? 'platform-netease' : s.platform === 'qq' ? 'platform-qq' : 'platform-kugou';
            var platformName = s.platform === 'netease' ? '网易' : s.platform === 'qq' ? 'QQ' : s.platform;
            return '<div class="glass-card p-3 flex items-center gap-3 song-item" style="animation-delay:' + (i*0.05) + 's">' +
                '<span class="text-sm text-gray-500 w-6 text-center">' + String(i+1).padStart(2,'0') + '</span>' +
                '<div class="flex-1 min-w-0 cursor-pointer" onclick="playSong(' + i + ')" style="overflow:hidden;">' +
                '<div class="flex items-center gap-2">' +
                '<p class="text-sm font-bold truncate">' + s.title + '</p>' +
                '<span class="platform-tag ' + platformClass + '">' + platformName + '</span>' +
                '</div>' +
                '<p class="text-xs text-gray-400 truncate">' + s.artist + '</p>' +
                '</div>' +
                '<button onclick="event.stopPropagation();downloadSong(' + i + ')" class="text-gray-400 hover:text-purple-400 px-2 transition" title="下载">' +
                '<i class="fas fa-download"></i></button>' +
                '<button onclick="event.stopPropagation();playSong(' + i + ')" class="text-purple-400 px-1">' +
                '<i class="fas fa-play-circle text-xl"></i></button></div>';
        }).join('');
    }

    // ========== 播放功能 ==========
    function playSong(index) {
        currentIndex = index;
        var song = currentSongs[index];
        var audio = document.getElementById('audioPlayer');

        if (!song.url) { showToast('播放链接不可用'); return; }

        audio.src = song.url;
        audio.play().then(function() {
            isPlaying = true;
            updatePlayerUI(song);
            showMiniPlayer();
            addToHistory(song);
        }).catch(function(err) {
            showToast('播放失败，尝试下一首');
            setTimeout(function() { nextSong(); }, 1500);
        });
    }

    function playRankSong(index) {
        var s = rankSongs[index];
        quickSearch(s.title + ' ' + s.artist);
    }

    function updatePlayerUI(song) {
        document.getElementById('playerTitle').textContent = song.title;
        document.getElementById('playerSongName').textContent = song.title;
        document.getElementById('playerArtist').textContent = song.artist;
        document.getElementById('playerCover').src = song.cover || 'https://picsum.photos/seed/' + encodeURIComponent(song.title) + '/300/300';
        document.getElementById('miniTitle').textContent = song.title;
        document.getElementById('miniArtist').textContent = song.artist;
        document.getElementById('miniCover').src = song.cover || 'https://picsum.photos/seed/' + encodeURIComponent(song.title) + '/300/300';
        document.getElementById('platformTag').textContent = song.platform === 'netease' ? '网易云音乐' : song.platform === 'qq' ? 'QQ音乐' : song.platform;
        updatePlayBtn();
        updateFavBtn();
    }

    function togglePlay() {
        var audio = document.getElementById('audioPlayer');
        if (!audio.src) { showToast('请先选择歌曲'); return; }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
        } else {
            audio.play();
            isPlaying = true;
        }
        updatePlayBtn();
    }

    function updatePlayBtn() {
        var icon = isPlaying ? 'fa-pause' : 'fa-play';
        var pl = isPlaying ? '' : 'style="padding-left:4px;"';
        document.getElementById('bigPlayBtn').innerHTML = '<i class="fas ' + icon + '" ' + pl + '></i>';
        document.getElementById('miniPlayBtn').innerHTML = '<i class="fas ' + icon + '" ' + (isPlaying ? '' : 'style="padding-left:2px;"') + '></i>';
        document.getElementById('playerEq').style.opacity = isPlaying ? '1' : '0.3';
    }

    function prevSong() {
        if (currentSongs.length === 0) return;
        currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
        playSong(currentIndex);
    }

    function nextSong() {
        if (currentSongs.length === 0) return;
        currentIndex = (currentIndex + 1) % currentSongs.length;
        playSong(currentIndex);
    }

    function toggleLoop() {
        isLoop = !isLoop;
        document.getElementById('loopBtn').style.color = isLoop ? '#a855f7' : '';
        showToast(isLoop ? '已开启循环播放' : '已关闭循环播放');
    }

    function seekAudio(val) {
        var audio = document.getElementById('audioPlayer');
        if (audio.duration) {
            audio.currentTime = (val / 100) * audio.duration;
        }
    }

    function setupAudioEvents() {
        var audio = document.getElementById('audioPlayer');
        audio.addEventListener('timeupdate', function() {
            if (audio.duration) {
                var pct = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressBar').value = pct;
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        });
        audio.addEventListener('ended', function() {
            if (isLoop) { audio.play(); } else { nextSong(); }
        });
        audio.addEventListener('error', function() {
            showToast('音频加载失败');
        });
    }

    function formatTime(s) {
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        return m + ':' + String(sec).padStart(2,'0');
    }

    // ========== 下载功能 ==========
    function downloadSong(index) {
        var song = currentSongs[index];
        if (!song.url) { showToast('下载链接不可用'); return; }

        var a = document.createElement('a');
        a.href = song.url;
        a.download = song.title + '.mp3';
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        addToDownloads(song);
        showToast('开始下载...');
    }

    function downloadCurrent() {
        if (currentIndex >= 0) downloadSong(currentIndex);
    }

    // ========== 收藏功能 ==========
    function toggleFavorite() {
        if (currentIndex < 0) return;
        var song = currentSongs[currentIndex];
        var key = song.title + '|' + song.artist;
        var idx = favorites.findIndex(function(f) { return f.title + '|' + f.artist === key; });
        if (idx >= 0) {
            favorites.splice(idx, 1);
            showToast('已取消收藏');
        } else {
            favorites.push(song);
            showToast('已添加到收藏');
        }
        localStorage.setItem('kl_favorites', JSON.stringify(favorites));
        updateFavBtn();
    }

    function updateFavBtn() {
        if (currentIndex < 0) return;
        var song = currentSongs[currentIndex];
        var key = song.title + '|' + song.artist;
        var isFav = favorites.some(function(f) { return f.title + '|' + f.artist === key; });
        document.getElementById('favBtn').innerHTML = '<i class="' + (isFav ? 'fas text-pink-400' : 'far') + ' fa-heart"></i>';
    }

    // ========== 历史记录 ==========
    function addToHistory(song) {
        history = history.filter(function(h) { return h.title + '|' + h.artist !== song.title + '|' + song.artist; });
        history.unshift(song);
        if (history.length > 50) history = history.slice(0, 50);
        localStorage.setItem('kl_history', JSON.stringify(history));
    }

    function addToDownloads(song) {
        if (!downloads.some(function(d) { return d.title + '|' + d.artist === song.title + '|' + song.artist; })) {
            downloads.unshift(song);
            localStorage.setItem('kl_downloads', JSON.stringify(downloads));
        }
    }

    function showHistory() {
        if (history.length === 0) { showToast('暂无播放历史'); return; }
        currentSongs = history;
        renderSongs(history);
        document.getElementById('searchResultSection').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultCount').textContent = '历史记录 ' + history.length + ' 首';
        switchPage('home');
    }

    function showFavorites() {
        if (favorites.length === 0) { showToast('暂无收藏歌曲'); return; }
        currentSongs = favorites;
        renderSongs(favorites);
        document.getElementById('searchResultSection').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultCount').textContent = '我的收藏 ' + favorites.length + ' 首';
        switchPage('home');
    }

    function showDownloads() {
        if (downloads.length === 0) { showToast('暂无下载记录'); return; }
        currentSongs = downloads;
        renderSongs(downloads);
        document.getElementById('searchResultSection').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultCount').textContent = '下载记录 ' + downloads.length + ' 首';
        switchPage('home');
    }

    // ========== 播放器页面 ==========
    function openPlayer() {
        document.getElementById('page-player').classList.add('active');
    }

    function closePlayer() {
        document.getElementById('page-player').classList.remove('active');
    }

    function showMiniPlayer() {
        document.getElementById('miniPlayer').style.display = 'block';
    }

    function shareSong() {
        if (currentIndex < 0) return;
        var song = currentSongs[currentIndex];
        var text = '正在听：' + song.title + ' - ' + song.artist + '，来自裤佬音乐网';
        if (navigator.share) {
            navigator.share({ title: '裤佬音乐', text: text, url: window.location.href });
        } else if (navigator.clipboard) {
            navigator.clipboard.writeText(text);
            showToast('已复制分享内容');
        } else {
            showToast('分享功能不可用');
        }
    }

    // ========== 加载歌单 ==========
    function loadPlaylist(id) {
        var p = playlists.find(function(x) { return x.id === id; });
        showToast('正在加载「' + p.name + '」...');
        var keywords = ['流行', '经典', '热门', '推荐', '精选', '伤感', '励志', '甜蜜'];
        var kw = keywords[(id - 1) % keywords.length];
        document.getElementById('searchInput').value = kw;
        doSearch();
        switchPage('home');
    }

    // ========== 工具函数 ==========
    function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.style.opacity = '1';
        t.style.pointerEvents = 'auto';
        setTimeout(function() {
            t.style.opacity = '0';
            t.style.pointerEvents = 'none';
        }, 2000);
    }

    function showLoading() {
        var list = document.getElementById('songList');
        if (list) list.innerHTML = '<div class="flex justify-center py-8"><div class="loader"></div></div>';
    }
    function hideLoading() {}
    </script>
</body>
</html>
