  <style>
    :root {
      --bg: #0a0a0f;
      --bg2: #12121a;
      --bg3: #1a1a28;
      --card: #16161f;
      --border: rgba(255,255,255,0.07);
      --accent: #7c4dff;
      --accent2: #e040fb;
      --accent3: #00e5ff;
      --text: #f0f0f5;
      --text2: #8888aa;
      --text3: #555575;
      --nav-h: 68px;
      --top-h: 60px;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      overflow: hidden;
    }

    /* ── APP SHELL ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      height: var(--top-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      background: rgba(10,10,15,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .topbar .logo {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .topbar .icon-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--bg3);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text2);
      font-size: 18px;
      transition: all 0.2s;
    }
    .topbar .icon-btn:active { transform: scale(0.92); }

    /* ── PAGES ── */
    .pages {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .page {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 16px calc(var(--nav-h) + 16px);
      display: none;
      scroll-behavior: smooth;
    }
    .page.active { display: block; }
    .page::-webkit-scrollbar { display: none; }

    /* ── MINI PLAYER BAR ── */
    .mini-player {
      position: absolute;
      left: 12px; right: 12px;
      bottom: calc(var(--nav-h) + 8px);
      background: linear-gradient(135deg, #1e1030 0%, #0e1a30 100%);
      border: 1px solid rgba(124,77,255,0.3);
      border-radius: var(--radius);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 12px;
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .mini-player:active { transform: scale(0.98); }
    .mini-player.hidden { display: none; }

    .mini-cover {
      width: 40px; height: 40px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      animation: spin 8s linear infinite;
      animation-play-state: paused;
    }
    .mini-cover.playing { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mini-info { flex: 1; min-width: 0; }
    .mini-info .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mini-info .artist { font-size: 11px; color: var(--text2); margin-top: 2px; }

    .mini-controls { display: flex; align-items: center; gap: 8px; }
    .mini-btn {
      width: 32px; height: 32px;
      border: none; background: none;
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: all 0.15s;
    }
    .mini-btn:active { transform: scale(0.88); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      height: var(--nav-h);
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      flex-shrink: 0;
      position: relative;
      z-index: 30;
    }

    .nav-item {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none; background: none;
      color: var(--text3);
      transition: color 0.2s;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: 4px;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item.active .nav-icon { filter: drop-shadow(0 0 6px var(--accent)); }

    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }

    .nav-indicator {
      position: absolute;
      top: 6px;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .nav-item.active .nav-indicator { opacity: 1; }

    /* ══════════════════════════════════
       PAGE: HOME
    ══════════════════════════════════ */
    .section-title {
      font-size: 18px; font-weight: 700;
      margin: 20px 0 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .section-title .see-all {
      font-size: 12px; font-weight: 400;
      color: var(--accent);
      cursor: pointer;
    }

    /* Banner */
    .banner {
      border-radius: var(--radius);
      background: linear-gradient(135deg, #1a0533 0%, #0d1f44 50%, #001a1a 100%);
      padding: 24px 20px;
      position: relative;
      overflow: hidden;
      margin-bottom: 4px;
    }
    .banner::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,77,255,0.4) 0%, transparent 70%);
    }
    .banner::after {
      content: '';
      position: absolute;
      bottom: -30px; left: 30px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.25) 0%, transparent 70%);
    }
    .banner-tag {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .banner h2 { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 6px; }
    .banner p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
    .banner-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none; cursor: pointer;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px; font-weight: 600;
      font-family: inherit;
      box-shadow: 0 4px 20px rgba(124,77,255,0.4);
      transition: all 0.2s;
    }
    .banner-btn:active { transform: scale(0.96); }

    /* Horizontal scroll list */
    .h-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
    }
    .h-scroll::-webkit-scrollbar { display: none; }

    /* Playlist Card */
    .pl-card {
      flex-shrink: 0;
      width: 140px;
      cursor: pointer;
      scroll-snap-align: start;
    }
    .pl-card:active .pl-cover { transform: scale(0.96); }
    .pl-cover {
      width: 100%; aspect-ratio: 1;
      border-radius: var(--radius-sm);
      object-fit: cover;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px;
      transition: transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .pl-cover .play-overlay {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .pl-card:hover .play-overlay { opacity: 1; }
    .pl-cover .count-badge {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
    }
    .pl-title { font-size: 12px; font-weight: 500; margin-top: 8px; line-height: 1.3;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pl-sub { font-size: 11px; color: var(--text2); margin-top: 3px; }

    /* Category chips */
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text2);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .chip.active, .chip:active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Song row */
    .song-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      border-radius: var(--radius-sm);
    }
    .song-row:last-child { border-bottom: none; }
    .song-row:active { background: rgba(255,255,255,0.04); }
    .song-row.playing .song-title { color: var(--accent); }

    .song-thumb {
      width: 50px; height: 50px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .song-thumb .eq-anim {
      position: absolute; inset: 0;
      background: rgba(124,77,255,0.7);
      display: none;
      align-items: flex-end; justify-content: center; gap: 2px;
      padding: 4px;
    }
    .song-row.playing .eq-anim { display: flex; }
    .eq-bar {
      width: 4px; border-radius: 2px; background: #fff;
      animation: eq 0.6s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(2) { animation-delay: 0.1s; }
    .eq-bar:nth-child(3) { animation-delay: 0.2s; }
    @keyframes eq {
      from { height: 4px; }
      to { height: 20px; }
    }

    .song-info { flex: 1; min-width: 0; }
    .song-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .song-meta { font-size: 12px; color: var(--text2); margin-top: 2px; }

    .song-actions { display: flex; align-items: center; gap: 6px; }
    .song-action-btn {
      width: 30px; height: 30px;
      border: none; background: none;
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      border-radius: 50%;
      transition: all 0.15s;
    }
    .song-action-btn:active { background: var(--bg3); transform: scale(0.9); }
    .song-action-btn.liked { color: #ff4081; }

    /* ══════════════════════════════════
       PAGE: PLAYLIST
    ══════════════════════════════════ */
    .playlist-header {
      background: linear-gradient(180deg, #1a0a2e 0%, var(--bg) 100%);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .playlist-header .big-cover {
      width: 140px; height: 140px;
      border-radius: var(--radius);
      margin: 0 auto 14px;
      font-size: 60px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
    }
    .playlist-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .playlist-header p { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
    .pl-actions { display: flex; gap: 10px; justify-content: center; }
    .pl-action-btn {
      flex: 1; max-width: 140px;
      padding: 12px;
      border-radius: 24px;
      border: none; cursor: pointer;
      font-size: 14px; font-weight: 600;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    .pl-action-btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,77,255,0.4);
    }
    .pl-action-btn.secondary {
      background: var(--bg3);
      color: var(--text);
    }
    .pl-action-btn:active { transform: scale(0.96); }

    /* ══════════════════════════════════
       PAGE: PLAYER (full screen)
    ══════════════════════════════════ */
    #page-player {
      background: linear-gradient(180deg, #12051f 0%, #05101e 60%, var(--bg) 100%);
    }

    .player-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .player-header .back-btn {
      width: 36px; height: 36px;
      border-radius: 50%; border: none;
      background: rgba(255,255,255,0.08);
      color: var(--text); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .player-header h3 { font-size: 14px; color: var(--text2); }

    .player-cover-wrap {
      position: relative;
      width: 80%; max-width: 280px;
      margin: 0 auto 28px;
    }
    .player-cover {
      width: 100%; aspect-ratio: 1;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
      position: relative;
      overflow: hidden;
      transition: transform 0.3s;
    }
    .player-cover.playing { animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .glow-ring {
      position: absolute; inset: -8px;
      border-radius: 30px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      opacity: 0;
      z-index: -1;
      filter: blur(20px);
      transition: opacity 0.3s;
    }
    .player-cover.playing + .glow-ring { opacity: 0.5; }

    .player-info { text-align: center; margin-bottom: 24px; }
    .player-info .p-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .player-info .p-artist { font-size: 14px; color: var(--text2); }

    .player-actions-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 4px;
    }
    .action-pill {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,0.07);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px; color: var(--text2);
      cursor: pointer; border: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .action-pill:active { background: rgba(255,255,255,0.12); }
    .action-pill .icon { font-size: 14px; }

    /* Progress */
    .progress-wrap { margin-bottom: 20px; }
    .progress-bar {
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      position: relative;
      transition: width 0.3s linear;
    }
    .progress-thumb {
      position: absolute;
      right: -6px; top: 50%;
      transform: translateY(-50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 8px rgba(124,77,255,0.6);
    }
    .time-row { display: flex; justify-content: space-between; margin-top: 6px;
      font-size: 11px; color: var(--text3); font-family: 'Space Mono', monospace; }

    /* Controls */
    .controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .ctrl-btn {
      border: none; background: none;
      color: var(--text2); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      transition: all 0.15s;
    }
    .ctrl-btn:active { transform: scale(0.88); color: var(--text); }
    .ctrl-btn.main {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 28px;
      box-shadow: 0 6px 24px rgba(124,77,255,0.5);
    }
    .ctrl-btn.main:active { transform: scale(0.94); }

    /* Volume */
    .vol-row { display: flex; align-items: center; gap: 10px; }
    .vol-icon { font-size: 16px; color: var(--text3); }
    .vol-slider {
      flex: 1; height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
    }
    .vol-fill {
      height: 100%;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      width: 70%;
    }

    /* ══════════════════════════════════
       PAGE: DISCOVER
    ══════════════════════════════════ */
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      margin-bottom: 16px;
    }
    .search-bar input {
      flex: 1; border: none; background: none;

      font-family: inherit;
      outline: none;
    }
    .search-bar input::placeholder { color: var(--text3); }
    .search-bar .search-icon { font-size: 16px; color: var(--text3); }

    .rank-item {

    .rank-num {

    }

    /* ══════════════════════════════════
       PAGE: MY LIBRARY
    ══════════════════════════════════ */

    .stat .lbl { font-size: 11px; color: var(--text2); }

    .lib-section { margin-bottom: 20px; }
    .lib-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
      background: var(--card);
      border-radius: var(--radius-sm);
      cursor: pointer;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      transition: all 0.15s;
    }
    .lib-item:active { background: var(--bg3); }
    .lib-item-icon { font-size: 22px; }
    .lib-item-info { flex: 1; }
    .lib-item-info strong { font-size: 14px; font-weight: 500; display: block; }
    .lib-item-info span { font-size: 12px; color: var(--text2); }
    .lib-item-arrow { color: var(--text3); font-size: 16px; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 90px);
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(30,30,45,0.95);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
      max-width: calc(100% - 40px);
      backdrop-filter: blur(16px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 50;
      display: flex; align-items: flex-end;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.show { opacity: 1; pointer-events: all; }
    .modal-sheet {
      width: 100%; max-width: 430px; margin: 0 auto;
      background: var(--bg2);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 20px 32px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .modal-overlay.show .modal-sheet { transform: translateY(0); }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .modal-btn {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      border: none; background: none;
      width: 100%; text-align: left;
      color: var(--text); font-family: inherit; font-size: 14px;
    }
    .modal-btn:last-child { border-bottom: none; }
    .modal-btn .m-icon { font-size: 20px; color: var(--text2); }
    .modal-btn:active { opacity: 0.7; }

    /* ── WAVEFORM decoration ── */
    .waveform-deco {
      display: flex; align-items: center; gap: 2px;
      height: 30px; overflow: hidden;
      opacity: 0.15;
    }
    .w-bar {
      width: 3px; border-radius: 2px;
      background: var(--accent2);
      animation: wv 1.2s ease-in-out infinite alternate;
    }
    .w-bar:nth-child(odd) { animation-direction: alternate-reverse; }
    @keyframes wv { from { height: 4px; } to { height: 28px; } }

    /* gradient covers */
    .cover-g1 { background: linear-gradient(135deg, #3d1177, #7c2d8e); }
    .cover-g2 { background: linear-gradient(135deg, #004d40, #00796b); }
    .cover-g3 { background: linear-gradient(135deg, #0d47a1, #1565c0); }
    .cover-g4 { background: linear-gradient(135deg, #b71c1c, #c62828); }
    .cover-g5 { background: linear-gradient(135deg, #e65100, #f57c00); }
    .cover-g6 { background: linear-gradient(135deg, #1a237e, #283593); }
    .cover-g7 { background: linear-gradient(135deg, #33691e, #558b2f); }
    .cover-g8 { background: linear-gradient(135deg, #4a148c, #6a1b9a); }

    /* first-visit greeting */
    .greeting { font-size: 13px; color: var(--text2); margin-bottom: 2px; }
    .greeting strong { color: var(--text); font-size: 20px; font-weight: 700; display: block; }

    /* Ripple */
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }
  </style>
</head>

  el.innerHTML = SONGS.slice(10).map((s,i) => songRowHTML(s,i+10)).join('');
}

function renderMyPlaylists() {
  const el = document.getElementById('my-playlists');
  el.innerHTML = PLAYLISTS.slice(0,3).map(pl => `
    <div class="lib-item" onclick="playPlaylist(${pl.id})">
      <span class="lib-item-icon">${pl.emoji}</span>
      <div class="lib-item-info">
        <strong>${pl.name}</strong>
        <span>${pl.sub}</span>
      </div>
      <span class="lib-item-arrow">›</span>
    </div>
  `).join('');
}

function songRowHTML(s, idx) {
  const playing = currentSong && currentSong.id === s.id;
  return `
    <div class="song-row ${playing?'playing':''}" id="row-${s.id}" onclick="playSong(${s.id})">
      <div class="song-thumb ${s.grad}">${s.emoji}
        <div class="eq-anim">
          <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        </div>
      </div>
      <div class="song-info">
        <div class="song-title" id="title-${s.id}">${s.title}</div>
        <div class="song-meta">${s.artist} · ${s.album}</div>
      </div>
      <div class="song-actions">
        <button class="song-action-btn ${likedSongs.has(s.id)?'liked':''}" 
          onclick="event.stopPropagation();quickLike(${s.id})" id="like-btn-${s.id}">
          ${likedSongs.has(s.id)?'❤️':'🤍'}
        </button>
        <button class="song-action-btn" onclick="event.stopPropagation();openSongMenu(${s.id})">⋯</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════════════
function playSong(id) {
  const song = SONGS.find(s => s.id === id);
  if (!song) return;

  // Clear old playing state
  if (currentSong) {
    const oldRow = document.getElementById('row-' + currentSong.id);
    if (oldRow) oldRow.classList.remove('playing');
  }

  currentSong = song;
  currentIndex = SONGS.findIndex(s => s.id === id);
  isPlaying = true;
  isLiked = likedSongs.has(id);
  progress = 0;

  updatePlayerUI();
  updateMiniPlayer();
  startProgress();
  document.getElementById('mini-player').classList.remove('hidden');

  // Update all rows
  document.querySelectorAll('.song-row').forEach(r => r.classList.remove('playing'));
  const newRow = document.getElementById('row-' + id);
  if (newRow) newRow.classList.add('playing');

  showToast(`▶ ${song.title} — ${song.artist}`);
}

function playPlaylist(plId) {
  const pl = PLAYLISTS[plId];
  if (!pl || !pl.songs.length) return;
  currentPlaylist = pl.songs.map(id => SONGS[id]).filter(Boolean);
  playSong(currentPlaylist[0].id);
  switchPage('player');
}

function togglePlay() {
  if (!currentSong) { showToast('请先选择一首歌 🎵'); return; }
  isPlaying = !isPlaying;
  if (isPlaying) { startProgress(); } else { stopProgress(); }
  updatePlayBtns();
  updateCoverAnim();
}

function prevSong() {
  let idx = currentIndex - 1;
  if (idx < 0) idx = SONGS.length - 1;
  playSong(SONGS[idx].id);
}

function nextSong() {
  let idx = isShuffle
    ? Math.floor(Math.random() * SONGS.length)
    : (currentIndex + 1) % SONGS.length;
  playSong(SONGS[idx].id);
}

function startProgress() {
  stopProgress();
  progressTimer = setInterval(() => {
    progress += 0.5;
    if (progress >= 100) {
      progress = 0;
      if (isRepeat) { /* restart */ }
      else { nextSong(); return; }
    }
    updateProgress();
  }, 150);
}

function stopProgress() {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
}

function seekTrack(e, bar) {
  const rect = bar.getBoundingClientRect();
  progress = Math.max(0, Math.min(100, (e.clientX - rect.left) / rect.width * 100));
  updateProgress();
}

function updateProgress() {
  const fill = document.getElementById('prog-fill');
  if (fill) fill.style.width = progress + '%';
  const totalSecs = currentSong ? parseDur(currentSong.dur) : 0;
  const curSecs = Math.floor(totalSecs * progress / 100);
  const curEl = document.getElementById('time-cur');
  const totEl = document.getElementById('time-tot');
  if (curEl) curEl.textContent = formatTime(curSecs);
  if (totEl) totEl.textContent = currentSong ? currentSong.dur : '0:00';
}

function parseDur(dur) {
  const [m,s] = dur.split(':').map(Number);
  return m*60 + s;
}
function formatTime(secs) {
  const m = Math.floor(secs/60), s = secs%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════
function updatePlayerUI() {
  if (!currentSong) return;
  const s = currentSong;
  document.getElementById('p-title').textContent = s.title;
  document.getElementById('p-artist').textContent = s.artist;
  document.getElementById('player-cover').className = `player-cover ${s.grad}`;
  document.getElementById('player-cover').textContent = s.emoji;
  document.getElementById('modal-song-title').textContent = s.title;
  document.getElementById('like-icon').textContent = isLiked ? '❤️' : '🤍';
  updatePlayBtns();
  updateCoverAnim();
  updateProgress();
}

function updateMiniPlayer() {
  if (!currentSong) return;
  const s = currentSong;
  document.getElementById('mini-title').textContent = s.title;
  document.getElementById('mini-artist').textContent = s.artist;
  const mc = document.getElementById('mini-cover');
  mc.className = `mini-cover ${s.grad}`;
  mc.style.cssText = 'display:flex;align-items:center;justify-content:center;font-size:18px';
  mc.textContent = s.emoji;
  updatePlayBtns();
  updateCoverAnim();
}

function updatePlayBtns() {
  const icon = isPlaying ? '⏸' : '▶';
  const mainBtn = document.getElementById('play-btn');
  const miniBtn = document.getElementById('mini-play');
  if (mainBtn) mainBtn.textContent = icon;
  if (miniBtn) miniBtn.textContent = icon;
}

function updateCoverAnim() {
  const cover = document.getElementById('player-cover');
  const glow = document.getElementById('glow-ring');
  const mc = document.getElementById('mini-cover');
  if (cover) { isPlaying ? cover.classList.add('playing') : cover.classList.remove('playing'); }
  if (mc) { isPlaying ? mc.classList.add('playing') : mc.classList.remove('playing'); }
  if (glow) { glow.style.opacity = isPlaying ? '0.5' : '0'; }
}

function toggleShuffle() {
  isShuffle = !isShuffle;
  const btn = document.getElementById('shuffle-btn');
  btn.style.color = isShuffle ? 'var(--accent)' : '';
  showToast(isShuffle ? '🔀 随机播放开启' : '🔀 随机播放关闭');
}

function toggleRepeat() {
  isRepeat = !isRepeat;
  const btn = document.getElementById('repeat-btn');
  btn.style.color = isRepeat ? 'var(--accent)' : '';
  showToast(isRepeat ? '🔁 单曲循环开启' : '🔁 单曲循环关闭');
}

function toggleLike() {
  if (!currentSong) return;
  isLiked = !isLiked;
  if (isLiked) { likedSongs.add(currentSong.id); } else { likedSongs.delete(currentSong.id); }
  document.getElementById('like-icon').textContent = isLiked ? '❤️' : '🤍';
  updateLikeBtn(currentSong.id, isLiked);
  updateLibraryStats();
  showToast(isLiked ? '❤️ 已添加到喜欢' : '🤍 已取消喜欢');
}

function quickLike(id) {
  if (likedSongs.has(id)) {
    likedSongs.delete(id);
    updateLikeBtn(id, false);
    if (currentSong && currentSong.id === id) { isLiked = false; const li = document.getElementById('like-icon'); if(li) li.textContent = '🤍'; }
    showToast('🤍 已取消喜欢');
  } else {
    likedSongs.add(id);
    updateLikeBtn(id, true);
    if (currentSong && currentSong.id === id) { isLiked = true; const li = document.getElementById('like-icon'); if(li) li.textContent = '❤️'; }
    showToast('❤️ 已添加到喜欢');
  }
  updateLibraryStats();
}

function updateLikeBtn(id, liked) {
  const btn = document.getElementById('like-btn-' + id);
  if (!btn) return;
  btn.className = 'song-action-btn' + (liked ? ' liked' : '');
  btn.textContent = liked ? '❤️' : '🤍';
}

function updateLibraryStats() {
  const cnt = likedSongs.size;
  const el1 = document.getElementById('stat-liked');
  const el2 = document.getElementById('liked-count-label');
  if (el1) el1.textContent = cnt;
  if (el2) el2.textContent = cnt + ' 首歌曲';
}

function setVolume(e, bar) {
  const rect = bar.getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  updateVolUI();
}

function updateVolUI() {
  const vf = document.getElementById('vol-fill');
  if (vf) vf.style.width = (volume * 100) + '%';
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
const PAGES = ['home','discover','player','library'];

function switchPage(name) {
  PAGES.forEach(p => {
    const el = document.getElementById('page-'+p);
    const nav = document.getElementById('nav-'+p);
    if (el) el.classList.toggle('active', p === name);
    if (nav) nav.classList.toggle('active', p === name);
  });

  // Hide mini player on player page
  const mini = document.getElementById('mini-player');
  if (currentSong) {
    mini.classList.toggle('hidden', name === 'player');
  }
}

// ═══════════════════════════════════════════
// DOWNLOAD
// ═══════════════════════════════════════════
function showDownloadModal() {
  if (!currentSong) { showToast('请先选择一首歌 🎵'); return; }
  document.getElementById('dl-modal').classList.add('show');
}

function startDownload(quality) {
  closeModal('dl-modal');
  downloadCount++;
  const dl = document.getElementById('stat-dl');
  const dlLabel = document.getElementById('dl-count-label');
  if (dl) dl.textContent = downloadCount;
  if (dlLabel) dlLabel.textContent = downloadCount + ' 首歌曲';

  const labels = { '128kbps':'标准品质', '320kbps':'高品质', 'flac':'无损FLAC' };
  if (quality === 'flac') {
    showToast('💎 FLAC需要VIP，已为你开启试用');
  } else {
    showToast(`⬇ 正在下载 ${currentSong?.title || ''} (${labels[quality]})`);
  }
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function openMoreModal() { document.getElementById('more-modal').classList.add('show'); }
function openSongMenu(id) {
  const s = SONGS.find(x=>x.id===id);
  if(s) document.getElementById('modal-song-title').textContent = s.title;
  document.getElementById('more-modal').classList.add('show');
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
// SEARCH / FILTER
// ═══════════════════════════════════════════
function handleSearch(val) {
  if (!val.trim()) { renderRankList(); return; }
  const q = val.toLowerCase();
  const results = SONGS.filter(s =>
    s.title.includes(val) || s.artist.includes(val) || s.album.includes(val)
  );
  const el = document.getElementById('rank-list');
  if (!results.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2)">未找到相关结果 😢</div>'; return; }
  el.innerHTML = results.map((s,i) => `
    <div class="rank-item" onclick="playSong(${s.id})">
      <div class="rank-num">${i+1}</div>
      <div class="song-thumb ${s.grad}">${s.emoji}</div>
      <div class="song-info">
        <div class="song-title">${s.title}</div>
        <div class="song-meta">${s.artist} · ${s.dur}</div>
      </div>
      <button class="song-action-btn" onclick="event.stopPropagation();quickLike(${s.id})">🤍</button>
    </div>
  `).join('');
}

function filterChip(el, cat) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  showToast(`🎵 已切换到 ${el.textContent} 分类`);
}
</script>
