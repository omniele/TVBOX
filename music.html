    // ========== 渲染歌单 ==========
    function renderPlaylists() {
        const grid = document.getElementById('playlistGrid');
        grid.innerHTML = playlists.slice(0, 4).map(p => `
            <div class="glass-card overflow-hidden cursor-pointer" onclick="loadPlaylist(${p.id})">
                <div class="playlist-cover h-32 relative">
                    <img src="${p.cover}" class="w-full h-full object-cover" alt="${p.name}" loading="lazy">
                    <div class="absolute bottom-2 left-2 z-10">
                        <p class="text-sm font-bold">${p.name}</p>
                        <p class="text-xs text-gray-300">${p.desc}</p>
                    </div>
                    <div class="absolute top-2 right-2 z-10 bg-black/50 rounded-full px-2 py-0.5 text-xs">
                        <i class="fas fa-play text-white"></i>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderAllPlaylists() {
        const grid = document.getElementById('allPlaylists');
        grid.innerHTML = playlists.map(p => `
            <div class="glass-card overflow-hidden cursor-pointer" onclick="loadPlaylist(${p.id})">
                <div class="playlist-cover h-36 relative">
                    <img src="${p.cover}" class="w-full h-full object-cover" alt="${p.name}" loading="lazy">
                    <div class="absolute bottom-2 left-2 z-10">
                        <p class="text-sm font-bold">${p.name}</p>
                        <p class="text-xs text-gray-300">${p.desc}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ========== 渲染排行榜 ==========
    function renderRankList() {
        const list = document.getElementById('rankList');
        list.innerHTML = rankSongs.map((s, i) => `
            <div class="glass-card p-3 flex items-center gap-3 mb-2 song-item" style="animation-delay:${i*0.05}s" onclick="playRankSong(${i})">
                <span class="text-lg font-bold w-6 text-center ${i<3?'text-yellow-400':'text-gray-500'}">${i+1}</span>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold truncate">${s.title}</p>
                    <p class="text-xs text-gray-400">${s.artist}</p>
                </div>
                <span class="text-xs text-gray-500">${s.duration}</span>
                <button class="text-purple-400 px-2"><i class="fas fa-play-circle text-xl"></i></button>
            </div>
        `).join('');
    }

    // ========== 搜索功能 ==========
    async function doSearch() {
        const q = document.getElementById('searchInput').value.trim();
        if (!q) return;
        showLoading();
        try {
            const res = await fetch(`https://api.lolimi.cn/API/qqdg/?word=${encodeURIComponent(q)}&n=20`);
            const data = await res.json();
            if (data.code === 200 && data.data) {
                currentSongs = data.data;
                renderSongs(currentSongs);
                document.getElementById('searchResultSection').style.display = 'block';
                document.getElementById('emptyState').style.display = 'none';
                document.getElementById('resultCount').textContent = `共 ${currentSongs.length} 首`;
            } else {
                showToast('未找到相关歌曲');
            }
        } catch (e) {
            showToast('搜索失败，请重试');
        }
        hideLoading();
    }

    function quickSearch(q) {
        document.getElementById('searchInput').value = q;
        doSearch();
    }

    function renderSongs(songs) {
        const list = document.getElementById('songList');
        list.innerHTML = songs.map((s, i) => `
            <div class="glass-card p-3 flex items-center gap-3 song-item" style="animation-delay:${i*0.05}s">
                <span class="text-sm text-gray-500 w-6 text-center">${String(i+1).padStart(2,'0')}</span>
                <div class="flex-1 min-w-0 cursor-pointer" onclick="playSong(${i})">
                    <p class="text-sm font-bold truncate">${s.song || s.title || '未知歌曲'}</p>
                    <p class="text-xs text-gray-400 truncate">${s.singer || s.artist || '未知歌手'}</p>
                </div>
                <span class="text-xs text-gray-500">${s.time || s.duration || ''}</span>
                <button onclick="event.stopPropagation();downloadSong(${i})" class="text-gray-400 hover:text-purple-400 px-2 transition" title="下载">
                    <i class="fas fa-download"></i>
                </button>
                <button onclick="event.stopPropagation();playSong(${i})" class="text-purple-400 px-1">
                    <i class="fas fa-play-circle text-xl"></i>
                </button>
            </div>
        `).join('');
    }

    // ========== 播放功能 ==========
    function playSong(index) {
        currentIndex = index;
        const song = currentSongs[index];
        const audio = document.getElementById('audioPlayer');

        audio.src = song.url || song.music || '';
        audio.play().then(() => {
            isPlaying = true;
            updatePlayerUI(song);
            showMiniPlayer();
            addToHistory(song);
        }).catch(() => {
            showToast('播放失败，尝试下一首');
            nextSong();
        });
    }

    function playRankSong(index) {
        const s = rankSongs[index];
        quickSearch(s.title + ' ' + s.artist);
    }

    function updatePlayerUI(song) {
        const title = song.song || song.title || '未知歌曲';
        const artist = song.singer || song.artist || '未知歌手';
        const cover = song.cover || song.pic || `https://picsum.photos/seed/${title}/300/300`;

        document.getElementById('playerTitle').textContent = title;
        document.getElementById('playerSongName').textContent = title;
        document.getElementById('playerArtist').textContent = artist;
        document.getElementById('playerCover').src = cover;
        document.getElementById('miniTitle').textContent = title;
        document.getElementById('miniArtist').textContent = artist;
        document.getElementById('miniCover').src = cover;
        document.getElementById('bitrate').textContent = song.quality || '320kbps';

        updatePlayBtn();
        updateFavBtn();
    }

    function togglePlay() {
        const audio = document.getElementById('audioPlayer');
        if (!audio.src) return;
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
        } else {
            audio.play();
            isPlaying = true;
        }
        updatePlayBtn();
    }

    function updatePlayBtn() {
        const icon = isPlaying ? 'fa-pause' : 'fa-play';
        const pl = isPlaying ? '' : 'pl-1';
        document.getElementById('bigPlayBtn').innerHTML = `<i class="fas ${icon} ${pl}"></i>`;
        document.getElementById('miniPlayBtn').innerHTML = `<i class="fas ${icon} ${pl}"></i>`;
        document.getElementById('playerEq').style.opacity = isPlaying ? '1' : '0.3';
    }

    function prevSong() {
        if (currentSongs.length === 0) return;
        currentIndex = (currentIndex - 1 + currentSongs.length) % currentSongs.length;
        playSong(currentIndex);
    }

    function nextSong() {
        if (currentSongs.length === 0) return;
        currentIndex = (currentIndex + 1) % currentSongs.length;
        playSong(currentIndex);
    }

    function toggleLoop() {
        isLoop = !isLoop;
        document.getElementById('loopBtn').style.color = isLoop ? '#a855f7' : '';
        showToast(isLoop ? '已开启循环播放' : '已关闭循环播放');
    }

    function seekAudio(val) {
        const audio = document.getElementById('audioPlayer');
        if (audio.duration) {
            audio.currentTime = (val / 100) * audio.duration;
        }
    }

    function setupAudioEvents() {
        const audio = document.getElementById('audioPlayer');
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                const pct = (audio.currentTime / audio.duration) * 100;
                document.getElementById('progressBar').value = pct;
                document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
                document.getElementById('duration').textContent = formatTime(audio.duration);
            }
        });
        audio.addEventListener('ended', () => {
            if (isLoop) {
                audio.play();
            } else {
                nextSong();
            }
        });
        audio.addEventListener('error', () => {
            showToast('音频加载失败');
        });
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return `${m}:${String(sec).padStart(2,'0')}`;
    }

    // ========== 下载功能 ==========
    function downloadSong(index) {
        const song = currentSongs[index];
        const url = song.url || song.music || '';
        if (!url) { showToast('下载链接不可用'); return; }

        const a = document.createElement('a');
        a.href = url;
        a.download = `${song.song || song.title || '未知歌曲'}.mp3`;
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        addToDownloads(song);
        showToast('开始下载...');
    }

    function downloadCurrent() {
        if (currentIndex >= 0) downloadSong(currentIndex);
    }

    // ========== 收藏功能 ==========
    function toggleFavorite() {
        if (currentIndex < 0) return;
        const song = currentSongs[currentIndex];
        const key = song.song + song.singer;
        const idx = favorites.findIndex(f => f.song + f.singer === key);
        if (idx >= 0) {
            favorites.splice(idx, 1);
            showToast('已取消收藏');
        } else {
            favorites.push(song);
            showToast('已添加到收藏');
        }
        localStorage.setItem('favorites', JSON.stringify(favorites));
        updateFavBtn();
    }

    function updateFavBtn() {
        if (currentIndex < 0) return;
        const song = currentSongs[currentIndex];
        const key = song.song + song.singer;
        const isFav = favorites.some(f => f.song + f.singer === key);
        document.getElementById('favBtn').innerHTML = `<i class="${isFav ? 'fas text-pink-400' : 'far'} fa-heart"></i>`;
    }

    // ========== 历史记录 ==========
    function addToHistory(song) {
        history = history.filter(h => h.song + h.singer !== song.song + song.singer);
        history.unshift(song);
        if (history.length > 50) history = history.slice(0, 50);
        localStorage.setItem('history', JSON.stringify(history));
    }

    function addToDownloads(song) {
        if (!downloads.some(d => d.song + d.singer === song.song + song.singer)) {
            downloads.unshift(song);
            localStorage.setItem('downloads', JSON.stringify(downloads));
        }
    }

    function showHistory() {
        if (history.length === 0) { showToast('暂无播放历史'); return; }
        currentSongs = history;
        renderSongs(history);
        document.getElementById('searchResultSection').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultCount').textContent = `历史记录 ${history.length} 首`;
        switchPage('home');
    }

    function showFavorites() {
        if (favorites.length === 0) { showToast('暂无收藏歌曲'); return; }
        currentSongs = favorites;
        renderSongs(favorites);
        document.getElementById('searchResultSection').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultCount').textContent = `我的收藏 ${favorites.length} 首`;
        switchPage('home');
    }

    function showDownloads() {
        if (downloads.length === 0) { showToast('暂无下载记录'); return; }
        currentSongs = downloads;
        renderSongs(downloads);
        document.getElementById('searchResultSection').style.display = 'block';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resultCount').textContent = `下载记录 ${downloads.length} 首`;
        switchPage('home');
    }

    // ========== 播放器页面 ==========
    function openPlayer() {
        document.getElementById('page-player').classList.add('active');
    }

    function closePlayer() {
        document.getElementById('page-player').classList.remove('active');
    }

    function showMiniPlayer() {
        document.getElementById('miniPlayer').classList.remove('hidden');
    }

    function shareSong() {
        if (currentIndex < 0) return;
        const song = currentSongs[currentIndex];
        const text = `正在听：${song.song || song.title} - ${song.singer || song.artist}，来自裤佬音乐网`;
        if (navigator.share) {
            navigator.share({ title: '裤佬音乐', text: text, url: window.location.href });
        } else {
            navigator.clipboard.writeText(text);
            showToast('已复制分享内容');
        }
    }

    // ========== 加载歌单 ==========
    async function loadPlaylist(id) {
        const p = playlists.find(x => x.id === id);
        showToast(`正在加载「${p.name}」...`);
        // 模拟加载歌单歌曲（实际可接入真实API）
        const keywords = ['流行', '经典', '热门', '推荐', '精选'];
        const kw = keywords[id % keywords.length];
        document.getElementById('searchInput').value = kw;
        await doSearch();
        switchPage('home');
    }

    // ========== 工具函数 ==========
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.remove('hidden');
        t.style.opacity = '1';
        setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.classList.add('hidden'), 300); }, 2000);
    }

    let loadingTimer;
    function showLoading() {
        const list = document.getElementById('songList');
        list.innerHTML = '<div class="flex justify-center py-8"><div class="loader"></div></div>';
    }
    function hideLoading() {}

    function toggleTheme() {
        showToast('主题切换功能开发中');
    }

    // PWA 支持
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('data:text/javascript,').catch(()=>{});
    }
    </script>
</body>
</html>
