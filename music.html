<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裤佬音乐网 - 在线高品质无损音乐播放与下载</title>
    <meta name="description" content="裤佬音乐网提供最新最全的无损音乐在线收听，支持多种音质选择，一键下载高品质MP3，打造你的专属私人音乐库。">
    <meta name="keywords" content="在线音乐,无损音乐下载,裤佬音乐,免费音乐播放器,高品质音乐">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "裤佬音乐网",
      "url": "https://your-domain.com/"
    }
    </script>
    
    <style>
        /* 增加全局平滑滚动 */
        html { scroll-behavior: smooth; }
        /* 底部导航栏样式 */
        .app-tabbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 65px;
            background: rgba(15, 12, 41, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>
<body class="bg-slate-950 text-white">

<div id="app">
    <div class="main-content pb-24">
        </div>

    <nav class="app-tabbar">
        <button @click="activeTab='home'" :class="{'text-purple-400': activeTab==='home'}">
            🏠 首页
        </button>
        <button @click="activeTab='playlist'" :class="{'text-purple-400': activeTab==='playlist'}">
            📋 歌单
        </button>
        <button @click="activeTab='download'" :class="{'text-purple-400': activeTab==='download'}">
            ⬇️ 下载
        </button>
    </nav>
</div>

<script>
    const { createApp, ref, watch } = Vue;

    createApp({
        setup() {
            const activeTab = ref('home');
            
            // SEO 动态更新函数
            const updateMeta = (title, desc) => {
                document.title = title;
                document.querySelector('meta[name="description"]').setAttribute('content', desc);
            };

            // 监听路由(tab)切换，更新 SEO
            watch(activeTab, (newTab) => {
                if(newTab === 'home') updateMeta('裤佬音乐网 - 首页', '欢迎来到裤佬音乐网...');
                if(newTab === 'playlist') updateMeta('精选歌单 - 裤佬音乐', '查看热门歌单推荐...');
            });

            return { activeTab };
        }
    }).mount('#app');
</script>
</body>
</html>
