<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>风象科技·高品质在线音乐 | QQ音乐 | 歌单推荐 | 音乐下载</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="风象科技音乐播放器聚合QQ音乐高品质音源，支持歌单推荐、搜索、在线播放与无损音乐下载，畅享纯粹聆听体验。">
  <meta name="keywords" content="风象科技,音乐下载,QQ音乐无损,免费音乐,MP3下载,在线歌曲,歌单推荐,音乐App">
  <meta name="theme-color" content="#3366CC">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "风象科技音乐播放器",
    "description": "风象科技聚合QQ音乐热门内容，支持无损下载、歌单推荐和在线播放。",
    "url": "https://your-domain.com/"
  }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.8/dist/axios.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #23408e 0%, #51b6d9 100%); color: #fff; margin:0; font-family: "PingFang SC","Arial",sans-serif;}
    a { color: #03c8e7; text-decoration: underline;}
    .main{padding-bottom:80px;max-width:430px;margin:0 auto;}
    .brand-bar{display:flex;align-items:center;justify-content:space-between;padding:15px 10px 8px 10px;}
    .brand-title{font-size:1.40em;letter-spacing:2px;font-family:Arial Black,PingFang SC,Arial;}
    .qr-block{display:flex;align-items:center;gap:9px; margin-top:6px;}
    .qr-img{width:58px;height:58px;border-radius:8px;border:2px solid #d9f3ff;box-shadow:0 2px 9px #03677733;}
    .qr-tip{font-size:.92em;line-height:1.12;color:#caf0ff;}
    .nav {position: fixed; bottom:0; left:0; right:0; display:flex; height: 55px; background: #234d7f;}
    .nav-btn {flex:1;text-align:center;line-height:1;font-size:18px;color:#e4e8f2b8;padding:6px 0 5px 0;}
    .nav-btn.active {color: #fff; border-top:3px solid #34c7e8; background:rgba(36,109,167,.14);}
    .tab-list {display:flex; gap:6px; margin:9px 0 4px 0;}
    .tab-btn{flex:1; padding:7px 0 3px 0;border-radius:16px; background:#227bb466;color:#25c6f7;text-align:center;cursor:pointer;}
    .tab-btn.active{background:linear-gradient(90deg,#14bbf5,#4ed9e6);color:#fff;}
    .search-box{display: flex; margin:14px 0;}
    .search-input{flex:1;padding:8px 10px; border-radius:11px;border:none;font-size:1em;}
    .song-list{margin-top:8px;}
    .song-item{background:rgba(255,255,255,0.10);border-radius:10px;margin-bottom:8px;padding:7px 8px;display:flex;align-items:center;cursor:pointer;transition:.13s;}
    .song-item.playing {background:linear-gradient(90deg, #25bbf7cc, #4fa6f055);}
    .song-art{width:35px;height:35px;border-radius:7px;object-fit:cover;margin-right:7px;}
    .song-meta{flex:1;}
    .song-title{font-weight:600;}
    .song-artist{font-size:.89em; color: #b9dfff;}
    .download-btn{background:#2fd6f2;color:#fff;border:none;border-radius:7px;padding:1px 12px;margin-left:7px;font-size:.97em;}
    .player{margin:10px 0 0 0; padding:18px 6px 14px 6px; background:rgba(0,34,56,0.09); border-radius:21px; box-shadow:0 2px 16px #c4e1f733;}
    .player-head{display:flex;flex-direction:column;align-items:center;}
    .player-art{width:96px;height:96px;border-radius:19px;border:2.2px solid #36c7ec;object-fit:cover;box-shadow:0 6px 40px #36c7ec40;}
    .player-title{font-size:1.16em;margin-top:6px;font-weight:700;text-align:center;}
    .player-artist{color:#b7e8fc;text-align:center;margin-bottom:6px;}
    .ctrl-row{display:flex;justify-content:center;align-items:center;margin:7px 0 10px 0;}
    .ctrl-btn{background:none;border:none;font-size:2.1em;margin:0 18px;color:#36c7ec;}
    .ctrl-btn.play{font-size:2.38em; border-radius:1em;padding:0 28px;background:linear-gradient(90deg,#0dcff7 , #3bbcce);color:white;}
    .range-bar{width:78%;accent-color:#2bc9ef;}
    .mini-tip{position:fixed;left:50%;bottom:78px;background:rgba(0,17,40,.92);color:#b0f2ff;font-size:13px;transform:translateX(-50%);padding:6px 18px;border-radius:15px;}
    .text-muted{color:#caf0fd;}
    @media (max-width:580px){ .main{padding-left:1.5vw;padding-right:1.5vw;} }
  </style>
</head>
<body>
<div id="app" class="main" v-cloak>
  <!-- 品牌区＋公众号 -->
  <div class="brand-bar">
    <span class="brand-title">风象科技 · 音乐播放器</span>
    <div class="qr-block">
      <img class="qr-img" src="https://tc.corichy.com/file/AgACAgUAAyEGAATobBkABC5qG7dBhK9_hNwkLlD3VVEc6ucHtAACbQ9rGz_X2VQc0Krq9k6vKAEAAwIAA20AAzsE.jpg" alt="风象科技公众号二维码">
      <span class="qr-tip">关注<br>风象科技公众号</span>
    </div>
  </div>
  <!-- 歌单tab -->
  <div class="tab-list">
    <div v-for="(p,i) in playlists" :key="i"
      :class="['tab-btn', {active:playlistIdx===i}]" @click="selectPlaylist(i)">
      {{p.emoji}} {{p.name}}
    </div>
  </div>
  <!-- 搜索 -->
  <div class="search-box">
    <input class="search-input" v-model="keyword" placeholder="搜索歌名/歌手..." @keyup.enter="doSearch">
    <button class="download-btn" @click="doSearch">搜索</button>
  </div>
  <!-- 歌曲列表tab页 -->
  <div v-if="tab==='home'">
    <div v-if="loading" class="text-muted" style="text-align:center; padding:27px">加载中...</div>
    <div v-else-if="songs.length===0" class="text-muted" style="text-align:center; padding:21px">暂无结果，请切换歌单或输入关键词</div>
    <div class="song-list" v-else>
      <div class="song-item" v-for="song in songs" :key="song.id" :class="{playing: currentSong && song.id===currentSong.id}" @click="playSong(song)">
        <img :src="song.artwork||defaultCover" class="song-art">
        <div class="song-meta">
          <div class="song-title">{{song.title}}</div>
          <div class="song-artist">{{song.artist}}</div>
        </div>
        <button class="download-btn" @click.stop="downloadSong(song)">⬇️</button>
      </div>
    </div>
  </div>
  <!-- 播放器tab，独立美观卡片布局 -->
  <div v-if="tab==='player' && currentSong" class="player">
    <div class="player-head">
      <img :src="currentSong.artwork||defaultCover" class="player-art">
      <div class="player-title">{{currentSong.title}}</div>
      <div class="player-artist">{{currentSong.artist}}</div>
    </div>
    <div class="ctrl-row">
      <button class="ctrl-btn" @click="prevSong" title="上一曲">⏮</button>
      <button class="ctrl-btn play" @click="togglePlay" title="播放/暂停">{{isPlaying? '⏸' : '▶'}}</button>
      <button class="ctrl-btn" @click="nextSong" title="下一曲">⏭</button>
    </div>
    <div class="ctrl-row" style="margin-top:-5px">
      <span style="font-size:12px;">{{currentTime}}</span>
      <input type="range" min="0" :max="durationNum" v-model="slider" @input="onSliderInput" class="range-bar">
      <span style="font-size:12px;">{{duration}}</span>
    </div>
    <button class="download-btn" @click="downloadSong(currentSong)" style="margin:auto;display:block;margin-top:7px">下载本曲</button>
    <audio ref="audioPlayer" :src="currentPlayUrl" @loadedmetadata="onLoaded" @timeupdate="onTimeUpdate" @ended="onEnded"></audio>
  </div>
  <!-- 导航栏 -->
  <div class="nav">
    <div class="nav-btn" :class="{active:tab==='home'}" @click="tab='home'">🏠<br><span class="nav-label">首页</span></div>
    <div class="nav-btn" :class="{active:tab==='player'}" @click="if(currentSong) tab='player'">▶️<br><span class="nav-label">播放</span></div>
  </div>
  <div v-if="msg" class="mini-tip">{{msg}}</div>
</div>
<script>
var PROXY='https://proxy.api.030101.xyz/';
var searchHeaders={
  referer:"https://y.qq.com","user-agent":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36",Cookie:"uin="
};
new Vue({
  el: '#app',
  data: {
    tab:'home',
    playlists:[
      {name:'风向热歌',emoji:'🔥',keywords:'热歌'},
      {name:'流行热曲',emoji:'🎵',keywords:'流行'},
      {name:'华语经典',emoji:'🎤',keywords:'华语'},
      {name:'轻听夜晚',emoji:'🌙',keywords:'夜曲'}
    ],
    playlistIdx:0,
    keyword:'',
    loading:false,
    songs:[],
    currentSong:null,
    currentPlayUrl:'',
    isPlaying:false,
    duration:'00:00',
    currentTime:'00:00',
    durationNum:0,
    slider:0,
    playError:'',
    msg:'',
    urlCache:{},
    defaultCover:'https://y.gtimg.cn/music/photo_new/T002R300x300M000000MkMni19ClKG.jpg'
  },
  mounted(){ this.selectPlaylist(0); },
  methods:{
    selectPlaylist(i){
      this.playlistIdx=i;
      this.keyword=this.playlists[i].keywords;
      this.doSearch();
    },
    async doSearch(){
      var q=this.keyword.trim(); if(!q){this.showMsg('输入关键词');return;}
      this.loading=true; this.songs=[];
      let dat = await this.searchMusicQuery(q,1);
      this.songs = dat; this.loading=false;
    },
    async searchMusicQuery(q,page){
      let dat = await axios.post(PROXY + 'https://u.y.qq.com/cgi-bin/musicu.fcg', {
        req_1: { method: "DoSearchForQQMusicDesktop", module: "music.search.SearchCgiService", param: { num_per_page: 20, page_num: page, query: q, search_type: 0 } }
      },{headers:searchHeaders,timeout:10000});
      var list = dat.data?.req_1?.data?.body?.song?.list||[];
      return list.map(_=>({
        id:_.id||_.songid, songmid:_.mid||_.songmid, title:_.title||_.songname,artist:_.singer?.map(s=>s.name).join(", ")||"未知",
        artwork:_.album?.mid?`https://y.gtimg.cn/music/photo_new/T002R800x800M000${_.album.mid}.jpg`:this.defaultCover,
        duration:_.interval ? `${Math.floor(_.interval/60)}:${String(_.interval%60).padStart(2,'0')}`: '03:30'
      }));
    },
    async playSong(song){
      this.currentSong=song; this.tab='player';this.playError='';this.isPlaying=false;
      let url=await this.getCachedPlayUrl(song.songmid);
      if(url){ this.currentPlayUrl=url; var ap=this.$refs.audioPlayer; setTimeout(()=>{ap.play();this.isPlaying=true;},130);}
      else{ this.showMsg('无法播放'); }
    },
    async getPlayUrl(songmid){
      var url = `https://music.haitangw.cc/music/qq_song_kw.php?id=${songmid}&level=exhigh&type=json`;
      try{
        var r=await axios.get(PROXY+url,{timeout:10000});
        return r.data?.data?.url||null;
      }catch{return null;}
    },
    async getCachedPlayUrl(songmid){
      if(this.urlCache[songmid]) return this.urlCache[songmid];
      var u = await this.getPlayUrl(songmid);
      if(u) this.urlCache[songmid]=u;
      return u;
    },
    togglePlay(){
      var ap = this.$refs.audioPlayer;
      if(this.isPlaying) ap.pause(); else ap.play();
      this.isPlaying=!this.isPlaying;
    },
    prevSong(){
      if(!this.currentSong) return;
      var idx=this.songs.findIndex(s=>s.id===this.currentSong.id);
      if(idx>0) this.playSong(this.songs[idx-1]);
    },
    nextSong(){
      if(!this.currentSong) return;
      var idx=this.songs.findIndex(s=>s.id===this.currentSong.id); 
      if(idx<this.songs.length-1) this.playSong(this.songs[idx+1]);
    },
    onLoaded(e){
      var ap=this.$refs.audioPlayer;
      this.durationNum=ap.duration|0; this.duration=this.ft(ap.duration);
    },
    onTimeUpdate(e){
      var ap=this.$refs.audioPlayer;
      this.currentTime=this.ft(ap.currentTime);
      this.slider = Math.floor(ap.currentTime);
    },
    onEnded(e){ this.isPlaying=false; this.nextSong(); },
    onSliderInput(){ var ap=this.$refs.audioPlayer; ap.currentTime=this.slider; },
    ft(s){ s=Number(s)||0;return (""+Math.floor(s/60)).padStart(2,'0')+':'+(""+(s%60|0)).padStart(2,'0'); },
    async downloadSong(song){
      this.showMsg('准备下载...');
      let url = await this.getCachedPlayUrl(song.songmid);
      if(!url) {this.showMsg("下载暂不支持");return;}
      let resp = await axios.get(PROXY+url,{responseType:'blob',timeout:18000});
      var blob = new Blob([resp.data],{type:"audio/mpeg"});
      var href = URL.createObjectURL(blob);
      var a = document.createElement('a'); a.href=href; a.download=`${song.title}-${song.artist}.mp3`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(href);
      this.showMsg('下载完成');
    },
    showMsg(t){this.msg=t;setTimeout(()=>this.msg='',1600);}
  }
});
</script>
</body>
</html>
